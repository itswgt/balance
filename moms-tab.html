<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mom's Tab">
<title>Mom's Tab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #c8f55a;
    --green: #5af5a0;
    --red: #f55a9b;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --danger: #f55a5a;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 40px;
    overflow-x: hidden;
  }

  .header {
    padding: 52px 24px 14px;
    background: linear-gradient(180deg, #13131a 80%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .balance-banner {
    margin: 0 20px 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .balance-main { flex: 1; }
  .balance-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .balance-amount {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -1px;
    transition: color 0.3s;
  }
  .balance-amount.owes { color: var(--red); }
  .balance-amount.settled { color: var(--green); }
  .balance-note { font-size: 12px; margin-top: 4px; }
  .balance-note.owes { color: var(--red); opacity: 0.7; }
  .balance-note.settled { color: var(--green); opacity: 0.7; }

  .balance-stats {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .stat { text-align: right; }
  .stat-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
  }
  .stat-val.spent { color: var(--red); }
  .stat-val.paid { color: var(--green); }

  .content { padding: 0 20px; }

  .section-title {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 18px 0 10px;
  }

  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .type-btn {
    flex: 1;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .type-btn.active-purchase {
    background: rgba(245,90,155,0.12);
    border-color: var(--red);
    color: var(--red);
  }
  .type-btn.active-payment {
    background: rgba(90,245,160,0.12);
    border-color: var(--green);
    color: var(--green);
  }

  .add-form {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .add-form label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
    display: block;
  }
  .add-form input, .add-form textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 11px 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .add-form input:focus, .add-form textarea:focus { border-color: var(--accent); }
  .add-form textarea { resize: none; height: 64px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .add-btn {
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    color: #0e0e12;
  }
  .add-btn.purchase { background: var(--red); color: #fff; }
  .add-btn.purchase:active { background: #d04080; }
  .add-btn.payment { background: var(--green); }
  .add-btn.payment:active { background: #40d080; }

  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 20px 0 10px;
  }
  .list-header h2 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .clear-all {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 10px;
    cursor: pointer;
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .ftab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ftab.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  .entry-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    animation: slideIn 0.22s ease;
    position: relative;
    overflow: hidden;
  }
  .entry-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .entry-item.purchase::before { background: var(--red); }
  .entry-item.payment::before { background: var(--green); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .entry-left { flex: 1; min-width: 0; }
  .entry-type-tag {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .entry-type-tag.purchase { color: var(--red); }
  .entry-type-tag.payment { color: var(--green); }

  .entry-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entry-right {
    text-align: right;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .entry-amount {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
  }
  .entry-amount.purchase { color: var(--red); }
  .entry-amount.payment { color: var(--green); }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 4px;
  }
  .del-btn:active { color: var(--danger); }
  .entry-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 36px 0;
  }
  .empty div { font-size: 30px; margin-bottom: 8px; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 24px 44px;
    width: 100%;
    max-width: 430px;
    border-top: 1px solid var(--border);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-confirm {
    flex: 1;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
  }
  .modal-cancel {
    flex: 1;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>👩 Mom's Tab</h1>
  <div class="subtitle">Track what she owes you</div>
</div>

<div class="balance-banner">
  <div class="balance-main">
    <div class="balance-label">Balance Mom Owes</div>
    <div class="balance-amount owes" id="balanceAmount">$0.00</div>
    <div class="balance-note owes" id="balanceNote">All settled up!</div>
  </div>
  <div class="balance-stats">
    <div class="stat">
      <div class="stat-label">Spent</div>
      <div class="stat-val spent" id="statSpent">$0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Received</div>
      <div class="stat-val paid" id="statPaid">$0.00</div>
    </div>
  </div>
</div>

<div class="content">

  <div class="section-title">Add Entry</div>
  <div class="type-toggle">
    <button class="type-btn active-purchase" id="typePurchase" onclick="setType('purchase')">🛍 Spend</button>
    <button class="type-btn" id="typePayment" onclick="setType('payment')">💵 Pay</button>
  </div>

  <div class="add-form">
    <div id="titleField">
      <label id="formTitleLabel">What did you buy?</label>
      <input type="text" id="entryTitle" placeholder="e.g. Groceries, Medicine..." maxlength="60">
    </div>
    <div class="row2">
      <div>
        <label>Amount ($)</label>
        <input type="number" id="entryAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="entryDate">
      </div>
    </div>
    <div>
      <label>Note (optional)</label>
      <textarea id="entryNote" placeholder="Any extra detail..."></textarea>
    </div>
    <button class="add-btn purchase" id="addBtn" onclick="addEntry()">+ Add Purchase</button>
  </div>

  <div class="list-header">
    <h2 id="listCount">History</h2>
    <button class="clear-all" onclick="clearAll()">Clear All</button>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" id="f-all" onclick="setFilter('all')">All</button>
    <button class="ftab" id="f-purchase" onclick="setFilter('purchase')">Purchases</button>
    <button class="ftab" id="f-payment" onclick="setFilter('payment')">Payments</button>
  </div>

  <div id="entryList"></div>
</div>

<div class="modal-overlay" id="confirmOverlay">
  <div class="modal">
    <h3>Clear All Entries?</h3>
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">This will delete everything and cannot be undone.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="cancelClear()">Cancel</button>
      <button class="modal-confirm" onclick="confirmClear()">Yes, Clear All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let entries = JSON.parse(localStorage.getItem('mom_tab_v1') || '[]');
let currentType = 'purchase';
let currentFilter = 'all';

function setType(t) {
  currentType = t;
  const isPurchase = t === 'purchase';
  document.getElementById('typePurchase').className = 'type-btn' + (isPurchase ? ' active-purchase' : '');
  document.getElementById('typePayment').className  = 'type-btn' + (!isPurchase ? ' active-payment' : '');
  document.getElementById('titleField').style.display = isPurchase ? 'block' : 'none';
  document.getElementById('formTitleLabel').textContent = 'What did you buy?';
  document.getElementById('entryTitle').placeholder = 'e.g. Groceries, Medicine...';
  const btn = document.getElementById('addBtn');
  btn.textContent = isPurchase ? '+ Add Purchase' : '+ Record Payment';
  btn.className = 'add-btn ' + t;
}

function setFilter(f) {
  currentFilter = f;
  ['all','purchase','payment'].forEach(x =>
    document.getElementById('f-' + x).classList.toggle('active', x === f));
  renderEntries();
}

function save() { localStorage.setItem('mom_tab_v1', JSON.stringify(entries)); }
function todayDate() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}
function fmt(n) { return '$' + Math.abs(n).toFixed(2); }

function addEntry() {
  const title  = currentType === 'payment' ? 'Payment' : document.getElementById('entryTitle').value.trim();
  const amount = parseFloat(document.getElementById('entryAmount').value);
  const date   = document.getElementById('entryDate').value || todayDate();
  const note   = document.getElementById('entryNote').value.trim();

  if (currentType === 'purchase' && !title) return toast('Enter what you bought!');
  if (isNaN(amount) || amount <= 0) return toast('Enter a valid amount!');

  entries.unshift({ id: Date.now(), type: currentType, title, amount, date, note });
  save();
  renderEntries();
  updateBalance();

  if (currentType === 'purchase') document.getElementById('entryTitle').value = '';
  document.getElementById('entryAmount').value = '';
  document.getElementById('entryDate').value   = todayDate();
  document.getElementById('entryNote').value   = '';
  toast(currentType === 'purchase' ? '🛍 Purchase added!' : '💵 Payment recorded!');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save(); renderEntries(); updateBalance();
}

function clearAll() {
  if (!entries.length) return toast('Nothing to clear!');
  document.getElementById('confirmOverlay').classList.add('show');
}
function confirmClear() {
  entries = []; save(); renderEntries(); updateBalance();
  document.getElementById('confirmOverlay').classList.remove('show');
  toast('All entries cleared!');
}
function cancelClear() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

function updateBalance() {
  const spent    = entries.filter(e => e.type === 'purchase').reduce((s,e) => s + e.amount, 0);
  const received = entries.filter(e => e.type === 'payment').reduce((s,e) => s + e.amount, 0);
  const balance  = spent - received;

  document.getElementById('statSpent').textContent = fmt(spent);
  document.getElementById('statPaid').textContent  = fmt(received);

  const balEl   = document.getElementById('balanceAmount');
  const noteEl  = document.getElementById('balanceNote');

  if (balance <= 0) {
    balEl.textContent  = '$0.00';
    balEl.className    = 'balance-amount settled';
    noteEl.textContent = balance < 0 ? `You overpaid by ${fmt(balance)}` : 'All settled up! 🎉';
    noteEl.className   = 'balance-note settled';
  } else {
    balEl.textContent  = fmt(balance);
    balEl.className    = 'balance-amount owes';
    noteEl.textContent = 'Mom still owes you';
    noteEl.className   = 'balance-note owes';
  }
}

function renderEntries() {
  const list = document.getElementById('entryList');
  let filtered = entries;
  if (currentFilter !== 'all') filtered = entries.filter(e => e.type === currentFilter);

  document.getElementById('listCount').textContent =
    filtered.length + ' Entr' + (filtered.length === 1 ? 'y' : 'ies');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div>${
      currentFilter === 'purchase' ? '🛍' : currentFilter === 'payment' ? '💵' : '📋'
    }</div>${
      currentFilter === 'purchase' ? 'No purchases yet' :
      currentFilter === 'payment'  ? 'No payments yet' : 'No entries yet'
    }</div>`;
    return;
  }

  list.innerHTML = filtered.map(e => `
    <div class="entry-item ${e.type}">
      <div class="entry-top">
        <div class="entry-left">
          <div class="entry-type-tag ${e.type}">${e.type === 'purchase' ? '🛍 Purchase' : '💵 Payment'}</div>
          <div class="entry-title">${esc(e.title)}</div>
          ${e.note ? `<div class="entry-note">${esc(e.note)}</div>` : ''}
          <div class="entry-date">📅 ${formatDate(e.date)}</div>
        </div>
        <div class="entry-right">
          <div class="entry-amount ${e.type}">${e.type === 'purchase' ? '+' : '−'}${fmt(e.amount)}</div>
          <button class="del-btn" onclick="deleteEntry(${e.id})">✕</button>
        </div>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

document.getElementById('entryDate').value = todayDate();
renderEntries();
updateBalance();
</script>
</body>
</html>
